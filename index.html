<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextDesk | Certified Pre-Owned Chromebooks Pakistan</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

    <style>
        /* CSS VARIABLES & DESIGN SYSTEM */
        :root {
            --bg-color: #111111;
            --secondary-bg: #1A1A1A;
            --card-bg: #222222;
            --accent-color: #00FF66;
            --accent-hover: #00D153;
            --accent-soft: rgba(0, 255, 102, 0.1);
            --text-primary: #FFFFFF;
            --text-secondary: #B3B3B3;
            --text-muted: #777777;
            --border-color: #2D2D2D;
            --font-heading: 'Montserrat', sans-serif;
            --font-body: 'Inter', sans-serif;
            --transition-speed: 0.3s;
            --border-radius: 12px;
        }

        /* RESET & BASE STYLES */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .container-narrow {
            max-width: 800px;
        }

        /* TYPOGRAPHY */
        h1, h2, h3, h4 {
            font-family: var(--font-heading);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        p {
            color: var(--text-secondary);
        }

        /* SECTION STYLING */
        section {
            padding: 5rem 0;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .section-header h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }

        .section-header p {
            font-size: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* STICKY NAVIGATION */
        .navbar {
            background-color: rgba(17, 17, 17, 0.9);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: var(--text-primary);
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 900;
            text-decoration: none;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.1rem;
        }

        .logo span {
            color: var(--accent-color);
        }

        .nav-menu {
            display: none;
            list-style: none;
            gap: 2rem;
        }

        .nav-menu a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color var(--transition-speed);
        }

        .nav-menu a:hover {
            color: var(--accent-color);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            font-family: var(--font-heading);
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: var(--border-radius);
            border: none;
            cursor: pointer;
            transition: all var(--transition-speed) cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 0.85rem;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 255, 102, 0.3);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: var(--text-secondary);
            transform: translateY(-2px);
        }

        /* MOBILE MENU TOGGLE */
        .menu-toggle {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 1001;
        }

        .menu-toggle span {
            display: block;
            width: 25px;
            height: 2px;
            background-color: var(--text-primary);
            transition: transform var(--transition-speed), opacity var(--transition-speed);
        }

        /* HERO SECTION */
        .hero {
            position: relative;
            min-height: 85vh;
            display: flex;
            align-items: center;
            padding: 4rem 0;
            background: radial-gradient(circle at 80% 20%, rgba(0, 255, 102, 0.07) 0%, rgba(17, 17, 17, 0) 60%);
        }

        .hero-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
            align-items: center;
        }

        .hero-text {
            text-align: center;
        }

        .hero-title {
            font-size: 2.5rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            font-weight: 900;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            max-width: 550px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-ctas {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            justify-content: center;
        }

        .hero-image-container {
            display: flex;
            justify-content: center;
            position: relative;
        }

        .hero-image-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-color);
            aspect-ratio: 16/10;
            background: linear-gradient(135deg, var(--secondary-bg) 0%, var(--card-bg) 100%);
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s ease;
        }

        .hero-badge {
            position: absolute;
            bottom: -15px;
            right: -15px;
            background-color: var(--secondary-bg);
            border: 1px solid var(--accent-color);
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 5;
        }

        .hero-badge-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .hero-badge-text {
            font-family: var(--font-heading);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* WHY BUY FROM NEXTDESK */
        .why-section {
            background-color: var(--secondary-bg);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .why-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .why-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 2.5rem 2rem;
            border-radius: var(--border-radius);
            transition: all var(--transition-speed);
        }

        .why-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-5px);
        }

        .why-icon {
            width: 42px;
            height: 42px;
            color: var(--accent-color);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .why-card h3 {
            font-size: 1.15rem;
            margin-bottom: 0.8rem;
        }

        .why-card p {
            font-size: 0.9rem;
        }

        /* FEATURED CHROMEBOOKS */
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .product-card {
            background-color: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition-speed), border-color var(--transition-speed);
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .product-image-container {
            position: relative;
            height: 230px;
            background: linear-gradient(135deg, var(--bg-color) 0%, var(--card-bg) 100%);
            overflow: hidden;
        }

        /* MULTI-IMAGE CAROUSEL SLIDER STYLES */
        .product-carousel {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform var(--transition-speed) cubic-bezier(0.25, 1, 0.5, 1);
            will-change: transform;
        }

        .carousel-slide {
            width: 100%;
            height: 100%;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--secondary-bg) 0%, var(--card-bg) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            cursor: zoom-in;
        }

        /* Navigational Dots */
        .carousel-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
            background: rgba(17, 17, 17, 0.65);
            padding: 5px 10px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .carousel-dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
            border: none;
            padding: 0;
        }

        .carousel-dot.active {
            background: var(--accent-color);
            transform: scale(1.25);
            box-shadow: 0 0 8px var(--accent-color);
        }

        /* Slide Navigation Arrows */
        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(17, 17, 17, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            font-size: 1.2rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-speed);
            user-select: none;
        }

        .carousel-arrow:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border-color: var(--accent-color);
        }

        .carousel-arrow.prev { left: 10px; }
        .carousel-arrow.next { right: 10px; }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s ease;
            cursor: zoom-in;
        }

        .product-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background-color: rgba(17, 17, 17, 0.9);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            text-transform: uppercase;
            z-index: 10;
        }

        .product-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .product-name {
            font-size: 1.2rem;
            line-height: 1.2;
        }

        .product-condition {
            font-size: 0.75rem;
            background-color: var(--accent-soft);
            color: var(--accent-color);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
            white-space: nowrap;
        }

        .product-specs-list {
            list-style: none;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }

        .product-spec-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .product-spec-icon {
            width: 16px;
            height: 16px;
            color: var(--accent-color);
            flex-shrink: 0;
        }

        .product-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .product-price-container {
            display: flex;
            flex-direction: column;
        }

        .price-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .product-price {
            font-family: var(--font-heading);
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        /* INTERACTIVE LIGHTBOX SYSTEM STYLES */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity var(--transition-speed) ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-close {
            position: absolute;
            top: 24px;
            right: 24px;
            color: var(--text-primary);
            font-size: 2.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 2001;
            line-height: 1;
        }

        .lightbox-close:hover {
            color: var(--accent-color);
        }

        .lightbox-content-container {
            max-width: 90%;
            max-height: 80%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            background-color: var(--secondary-bg);
            cursor: zoom-in;
            position: relative;
        }

        .lightbox-content-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.15s ease-out;
            user-select: none;
            display: block;
        }

        .lightbox-content-container.zoomed img {
            transform: scale(2.5);
            cursor: zoom-out;
        }

        .lightbox-caption {
            position: absolute;
            bottom: 24px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: center;
            width: 100%;
            font-family: var(--font-body);
        }

        /* HOW ORDERING WORKS */
        .steps-section {
            background-color: var(--secondary-bg);
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .steps-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .step-card {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 2.5rem 2rem;
            border-radius: var(--border-radius);
            position: relative;
        }

        .step-num {
            font-family: var(--font-heading);
            font-weight: 900;
            font-size: 3rem;
            line-height: 1;
            color: var(--accent-color);
            opacity: 0.15;
            position: absolute;
            top: 1rem;
            right: 1.5rem;
        }

        .step-card h3 {
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
        }

        /* WHY BUY USED */
        .benefits-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
            align-items: center;
        }

        .benefits-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .benefit-item {
            display: flex;
            gap: 1rem;
        }

        .benefit-icon-box {
            width: 40px;
            height: 40px;
            background-color: var(--secondary-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-color);
            flex-s
